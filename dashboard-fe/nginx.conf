server {
    listen 80;

    resolver 127.0.0.11 valid=30s;

    location /api/ {
        proxy_pass http://dashboard:8080/api/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        # Keep connection open for SSE
        proxy_set_header Connection '';
        proxy_buffering off;
        proxy_cache off;
        proxy_read_timeout 86400s;
    }

    location /simulate/ {
        set $sim_upstream simulation:8001;
        proxy_pass http://$sim_upstream;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    location / {
        root /usr/share/nginx/html;
        try_files $uri $uri/ /index.html;
    }
}

# Public-facing proxy for simulation's *target* endpoints only (the fake
# website traffic generators hit). /admin and /simulate are simulation's
# management API, not target endpoints, and must stay unreachable here even
# though this server block is bound to all interfaces — the dashboard-fe
# location above already proxies /simulate/ for the trusted dashboard UI on
# the main port, so legitimate management traffic isn't lost.
server {
    listen 8001;

    resolver 127.0.0.11 valid=30s;

    location /admin/ {
        return 403;
    }

    location /simulate/ {
        return 403;
    }

    location / {
        set $sim_upstream simulation:8001;
        proxy_pass http://$sim_upstream;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }
}
