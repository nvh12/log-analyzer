spring:
  application:
    name: reaction
  datasource:
    url: jdbc:postgresql://${POSTGRES_HOST:localhost}:${POSTGRES_PORT:5432}/${POSTGRES_DB:log-analyzer}
    username: ${POSTGRES_USER}
    password: ${POSTGRES_PASSWORD}
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 10
      minimum-idle: 2
      connection-timeout: 5000
      idle-timeout: 600000
  flyway:
    enabled: true
    locations: classpath:db/migration
    default-schema: reaction
  jpa:
    database-platform: org.hibernate.dialect.PostgreSQLDialect
    hibernate:
      ddl-auto: validate
    open-in-view: false
  rabbitmq:
    host: ${RABBITMQ_HOST:localhost}
    port: ${RABBITMQ_PORT:5672}
    username: ${RABBITMQ_USERNAME}
    password: ${RABBITMQ_PASSWORD}
    connection-timeout: 5000
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      password: ${REDIS_PASSWORD:}
  mail:
    host: ${SMTP_HOST:localhost}
    port: ${SMTP_PORT:587}
    username: ${SMTP_USERNAME:}
    password: ${SMTP_PASSWORD:}
    properties:
      mail.smtp.auth: true
      mail.smtp.starttls.enable: true

management:
  health:
    mail:
      enabled: false

alert:
  provider: ${ALERT_PROVIDER:smtp}
  batch-interval-seconds: ${ALERT_BATCH_INTERVAL_SECONDS:180}
  mail:
    from: ${ALERT_MAIL_FROM:}
    to: ${ALERT_MAIL_TO:}
  resend:
    api-key: ${RESEND_API_KEY:}
  discord:
    webhook-url: ${ALERT_DISCORD_WEBHOOK_URL:}

simulation:
  url: ${SIMULATION_URL:http://localhost:8001}
  admin-api-key: ${ADMIN_API_KEY:}
