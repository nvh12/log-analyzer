name: log-analyzer-test

services:
  rabbitmq:
    image: rabbitmq:4.2.4-management
    container_name: log-analyzer-rabbitmq-test
    hostname: rabbit-server
    ports:
      - "5672:5672"
      - "15672:15672"
    environment:
      RABBITMQ_DEFAULT_USER: testrmq
      RABBITMQ_DEFAULT_PASS: testrmqpass
      RABBITMQ_DEFAULT_VHOST: /
    networks:
      - log-analyzer-test
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  postgres-db:
    image: postgres:17.5
    container_name: log-analyzer-postgres-test
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: testuser
      POSTGRES_PASSWORD: testpass
      POSTGRES_DB: log-analyzer
    tmpfs:
      - /var/lib/postgresql/data
    networks:
      - log-analyzer-test
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U testuser -d log-analyzer"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7.4
    container_name: log-analyzer-redis-test
    ports:
      - "6379:6379"
    tmpfs:
      - /data
    networks:
      - log-analyzer-test
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  minio:
    image: minio/minio:RELEASE.2025-09-07T16-13-09Z
    container_name: log-analyzer-minio-test
    ports:
      - "9000:9000"
      - "9001:9001"
    environment:
      MINIO_ROOT_USER: testminio
      MINIO_ROOT_PASSWORD: testminiopass
    command: server /data --console-address ":9001"
    tmpfs:
      - /data
    networks:
      - log-analyzer-test
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 10s
      timeout: 5s
      retries: 5

  minio-init:
    image: minio/mc:RELEASE.2025-05-21T01-59-54Z
    container_name: log-analyzer-minio-init-test
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
      mc alias set local http://minio:9000 testminio testminiopass &&
      mc mb --ignore-existing local/models
      "
    networks:
      - log-analyzer-test

  log-processing:
    build:
      context: ./log-processing
      dockerfile: Dockerfile
    container_name: log-analyzer-log-processing-test
    ports:
      - "18080:8080"
    environment:
      POSTGRES_HOST: postgres-db
      POSTGRES_PORT: 5432
      POSTGRES_USER: testuser
      POSTGRES_PASSWORD: testpass
      POSTGRES_DB: log-analyzer
      RABBITMQ_HOST: rabbitmq
      RABBITMQ_PORT: 5672
      RABBITMQ_USERNAME: testrmq
      RABBITMQ_PASSWORD: testrmqpass
      REDIS_HOST: redis
      REDIS_PORT: 6379
      # Speed up DLQ retries so test_error_paths completes quickly
      LOG_PROCESSING_RETRY_DELAY_MS: 500
      LOG_PROCESSING_RETRY_JITTER_MS: 100
      LOG_PROCESSING_MAX_RETRIES: 2
    depends_on:
      rabbitmq:
        condition: service_healthy
      redis:
        condition: service_healthy
      postgres-db:
        condition: service_healthy
    networks:
      - log-analyzer-test
    healthcheck:
      # eclipse-temurin:21-jre-alpine has wget (BusyBox); exits non-0 on HTTP errors
      test: ["CMD-SHELL", "wget -qO /dev/null http://localhost:8080/actuator/health"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 30s

  log-analysis:
    build:
      context: ./log-analysis
      dockerfile: server/Dockerfile
    container_name: log-analyzer-log-analysis-test
    ports:
      - "18000:8000"
    environment:
      REDIS_URL: redis://redis:6379/0
      RABBITMQ_URL: amqp://testrmq:testrmqpass@rabbitmq/
      MINIO_ENDPOINT: minio:9000
      MINIO_ACCESS_KEY: testminio
      MINIO_SECRET_KEY: testminiopass
      MINIO_BUCKET: models
      MINIO_SECURE: "false"
      POSTGRES_DSN: postgresql://testuser:testpass@postgres-db:5432/log-analyzer
      # Run detection jobs every 2 seconds so tests complete quickly
      CRON_TRAFFIC: "*/2 * * * * *"
      CRON_WEB_ATTACK: "*/2 * * * * *"
    depends_on:
      rabbitmq:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio-init:
        condition: service_completed_successfully
      postgres-db:
        condition: service_healthy
    networks:
      - log-analyzer-test
    healthcheck:
      # python:3.12-slim has Python; urlopen raises on non-2xx → exits non-0
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:8000/health')\""]
      interval: 10s
      timeout: 10s
      retries: 18
      start_period: 60s

  simulation:
    build:
      context: ./simulation
      dockerfile: Dockerfile
    container_name: log-analyzer-simulation-test
    ports:
      - "18001:8001"
    environment:
      REDIS_URL: redis://redis:6379/0
      RABBITMQ_URL: amqp://testrmq:testrmqpass@rabbitmq/
      ADMIN_API_KEY: test-admin-key
      MINIO_ENDPOINT: minio:9000
      MINIO_ACCESS_KEY: testminio
      MINIO_SECRET_KEY: testminiopass
      MINIO_BUCKET: models
      MINIO_SECURE: "false"
    depends_on:
      rabbitmq:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio-init:
        condition: service_completed_successfully
    networks:
      - log-analyzer-test
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:8001/health')\""]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 20s

  reaction:
    build:
      context: ./reaction
      dockerfile: Dockerfile
    container_name: log-analyzer-reaction-test
    ports:
      - "18082:8080"
    environment:
      POSTGRES_HOST: postgres-db
      POSTGRES_PORT: 5432
      POSTGRES_USER: testuser
      POSTGRES_PASSWORD: testpass
      POSTGRES_DB: log-analyzer
      RABBITMQ_HOST: rabbitmq
      RABBITMQ_PORT: 5672
      RABBITMQ_USERNAME: testrmq
      RABBITMQ_PASSWORD: testrmqpass
      REDIS_HOST: redis
      REDIS_PORT: 6379
      # Disable alert channels so tests don't need real SMTP or Discord
      ALERT_PROVIDER: discord
      # No ALERT_DISCORD_WEBHOOK_URL → DiscordAlertService not registered
      # → CompositeAlertService has no channels, logs a warning, otherwise works fine
    depends_on:
      rabbitmq:
        condition: service_healthy
      redis:
        condition: service_healthy
      postgres-db:
        condition: service_healthy
    networks:
      - log-analyzer-test
    healthcheck:
      test: ["CMD-SHELL", "wget -qO /dev/null http://localhost:8080/actuator/health"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 30s

networks:
  log-analyzer-test:
    driver: bridge
