name: log-analyzer

services:
  rabbitmq:
    image: rabbitmq:4.2.4-management
    container_name: rabbitmq-log-analyzer
    hostname: rabbit-server
    ports:
      - "127.0.0.1:${RABBITMQ_PORT:-5672}:5672"
      - "127.0.0.1:${RABBITMQ_MGMT_PORT:-15672}:15672"
    environment:
      RABBITMQ_DEFAULT_USER: ${RABBITMQ_USER}
      RABBITMQ_DEFAULT_PASS: ${RABBITMQ_PASS}
      RABBITMQ_DEFAULT_VHOST: /
    volumes:
      - rabbit-data:/var/lib/rabbitmq
    networks:
      - log-analyzer
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  postgres-db:
    image: postgres:17.5
    container_name: postgres-log-analyzer
    ports:
      - "127.0.0.1:${POSTGRES_PORT:-5432}:5432"
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASS}
      POSTGRES_DB: ${POSTGRES_DB:-log-analyzer}
    volumes:
      - db-data:/var/lib/postgresql/data
    networks:
      - log-analyzer
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7.4
    container_name: redis-log-analyzer
    ports:
      - "127.0.0.1:${REDIS_PORT:-6379}:6379"
    environment:
      REDIS_PASS: ${REDIS_PASS:?REDIS_PASS must be set — an empty value disables Redis auth}
    command:
      - sh
      - -c
      - redis-server --appendonly yes --requirepass "$REDIS_PASS"
    volumes:
      - redis-data:/data
    networks:
      - log-analyzer
    healthcheck:
      test: ["CMD-SHELL", "redis-cli -a \"$REDIS_PASS\" ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  minio:
    image: minio/minio:RELEASE.2025-09-07T16-13-09Z
    container_name: minio-log-analyzer
    ports:
      - "127.0.0.1:${MINIO_PORT:-9000}:9000"
      - "127.0.0.1:${MINIO_CONSOLE_PORT:-9001}:9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_USER}
      MINIO_ROOT_PASSWORD: ${MINIO_PASS}
    command: server /data --console-address ":9001"
    volumes:
      - minio-data:/data
    networks:
      - log-analyzer
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 10s
      timeout: 5s
      retries: 5

  log-processing:
    build:
      context: ./log-processing
      dockerfile: Dockerfile
    container_name: log-processing
    ports:
      - "127.0.0.1:${APP_PORT:-8080}:8080"
    environment:
      POSTGRES_HOST: postgres-db
      POSTGRES_PORT: 5432
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASS}
      POSTGRES_DB: ${POSTGRES_DB:-log-analyzer}
      RABBITMQ_HOST: rabbitmq
      RABBITMQ_PORT: 5672
      RABBITMQ_USERNAME: ${RABBITMQ_USER}
      RABBITMQ_PASSWORD: ${RABBITMQ_PASS}
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_PASSWORD: ${REDIS_PASS}
    depends_on:
      rabbitmq:
        condition: service_healthy
      redis:
        condition: service_healthy
      postgres-db:
        condition: service_healthy
    networks:
      - log-analyzer
    healthcheck:
      test: ["CMD-SHELL", "wget -qO /dev/null http://localhost:8080/actuator/health"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 30s

  log-analysis:
    build:
      context: ./log-analysis
      dockerfile: server/Dockerfile
    container_name: log-analysis
    ports:
      - "127.0.0.1:${DETECTION_PORT:-8000}:8000"
    environment:
      REDIS_URL: redis://:${REDIS_PASS}@redis:6379/0
      RABBITMQ_URL: amqp://${RABBITMQ_USER}:${RABBITMQ_PASS}@rabbitmq/
      MINIO_ENDPOINT: minio:9000
      MINIO_ACCESS_KEY: ${MINIO_USER}
      MINIO_SECRET_KEY: ${MINIO_PASS}
      MINIO_BUCKET: ${MINIO_BUCKET:-models}
      MINIO_SECURE: "${MINIO_SECURE:-false}"
      POSTGRES_DSN: postgresql://${POSTGRES_USER}:${POSTGRES_PASS}@postgres-db:5432/${POSTGRES_DB:-log-analyzer}
    depends_on:
      rabbitmq:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_healthy
      postgres-db:
        condition: service_healthy
    networks:
      - log-analyzer
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:8000/health')\""]
      interval: 10s
      timeout: 10s
      retries: 18
      start_period: 60s

  simulation:
    build:
      context: ./simulation
      dockerfile: Dockerfile
    container_name: simulation
    ports:
      - "127.0.0.1:${SIMULATION_PORT:-8001}:8001"
    environment:
      REDIS_URL: redis://:${REDIS_PASS}@redis:6379/0
      RABBITMQ_URL: amqp://${RABBITMQ_USER}:${RABBITMQ_PASS}@rabbitmq/
      ADMIN_API_KEY: ${ADMIN_API_KEY}
      MINIO_ENDPOINT: minio:9000
      MINIO_ACCESS_KEY: ${MINIO_USER}
      MINIO_SECRET_KEY: ${MINIO_PASS}
      MINIO_BUCKET: ${MINIO_BUCKET:-models}
      MINIO_SECURE: "${MINIO_SECURE:-false}"
    depends_on:
      rabbitmq:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_healthy
      log-processing:
        condition: service_healthy
    networks:
      - log-analyzer
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:8001/health')\""]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 20s

  reaction:
    build:
      context: ./reaction
      dockerfile: Dockerfile
    container_name: reaction
    ports:
      - "127.0.0.1:${REACTION_PORT:-8082}:8080"
    environment:
      POSTGRES_HOST: postgres-db
      POSTGRES_PORT: 5432
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASS}
      POSTGRES_DB: ${POSTGRES_DB:-log-analyzer}
      RABBITMQ_HOST: rabbitmq
      RABBITMQ_PORT: 5672
      RABBITMQ_USERNAME: ${RABBITMQ_USER}
      RABBITMQ_PASSWORD: ${RABBITMQ_PASS}
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_PASSWORD: ${REDIS_PASS}
      ALERT_DISCORD_WEBHOOK_URL: ${DISCORD_WEBHOOK_URL:-}
      ALERT_PROVIDER: ${ALERT_PROVIDER:-smtp}
      SMTP_HOST: ${SMTP_HOST:-}
      SMTP_PORT: ${SMTP_PORT:-587}
      SMTP_USERNAME: ${SMTP_USERNAME:-}
      SMTP_PASSWORD: ${SMTP_PASSWORD:-}
      ALERT_MAIL_FROM: ${ALERT_MAIL_FROM:-}
      ALERT_MAIL_TO: ${ALERT_MAIL_TO:-}
      RESEND_API_KEY: ${RESEND_API_KEY:-}
    depends_on:
      rabbitmq:
        condition: service_healthy
      redis:
        condition: service_healthy
      postgres-db:
        condition: service_healthy
    networks:
      - log-analyzer
    healthcheck:
      test: ["CMD-SHELL", "wget -qO /dev/null http://localhost:8080/actuator/health"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 30s

  dashboard-fe:
    build:
      context: ./dashboard-fe
      dockerfile: Dockerfile
      args:
        SSL: "true"
    container_name: dashboard-fe
    ports:
      - "${FRONTEND_HTTP_PORT:-80}:80"
      - "${FRONTEND_PORT:-443}:443"
    depends_on:
      dashboard:
        condition: service_healthy
    networks:
      - log-analyzer

  dashboard:
    build:
      context: ./dashboard
      dockerfile: Dockerfile
    container_name: dashboard
    ports:
      - "127.0.0.1:${DASHBOARD_PORT:-8083}:8080"
    environment:
      POSTGRES_HOST: postgres-db
      POSTGRES_PORT: 5432
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASS}
      POSTGRES_DB: ${POSTGRES_DB:-log-analyzer}
      RABBITMQ_HOST: rabbitmq
      RABBITMQ_PORT: 5672
      RABBITMQ_USERNAME: ${RABBITMQ_USER}
      RABBITMQ_PASSWORD: ${RABBITMQ_PASS}
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_PASSWORD: ${REDIS_PASS}
      RABBITMQ_MANAGEMENT_URL: http://rabbitmq:15672
      DETECTION_METRICS_URL: http://log-analysis:8000/metrics
      CORS_ORIGINS: ${CORS_ORIGINS:-http://localhost:3000}
    depends_on:
      rabbitmq:
        condition: service_healthy
      redis:
        condition: service_healthy
      postgres-db:
        condition: service_healthy
    networks:
      - log-analyzer
    healthcheck:
      test: ["CMD-SHELL", "wget -qO /dev/null http://localhost:8080/actuator/health"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 30s

volumes:
  db-data:
  redis-data:
  rabbit-data:
  minio-data:

networks:
  log-analyzer:
    driver: bridge
