spring:
  application:
    name: dashboard
  datasource:
    url: jdbc:postgresql://${POSTGRES_HOST:localhost}:${POSTGRES_PORT:5432}/${POSTGRES_DB:log-analyzer}
    username: ${POSTGRES_USER}
    password: ${POSTGRES_PASSWORD}
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 10
      minimum-idle: 2
      connection-timeout: 5000
      idle-timeout: 600000
  rabbitmq:
    host: ${RABBITMQ_HOST:localhost}
    port: ${RABBITMQ_PORT:5672}
    username: ${RABBITMQ_USERNAME}
    password: ${RABBITMQ_PASSWORD}
    connection-timeout: 5000
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      password: ${REDIS_PASSWORD:}

  jpa:
    database-platform: org.hibernate.dialect.PostgreSQLDialect
    hibernate:
      ddl-auto: none
    properties:
      hibernate:
        jdbc:
          time_zone: UTC
    open-in-view: false

management:
  endpoints:
    web:
      exposure:
        include: health,metrics

dashboard:
  cors-origins: ${CORS_ORIGINS:http://localhost:3000}
  rabbitmq-management-url: ${RABBITMQ_MANAGEMENT_URL:http://localhost:15672}
  rabbitmq-management-user: ${RABBITMQ_USERNAME:guest}
  rabbitmq-management-password: ${RABBITMQ_PASSWORD:guest}
  detection-metrics-url: ${DETECTION_METRICS_URL:http://localhost:8000/metrics}
